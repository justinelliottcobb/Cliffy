<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Cliffy Alive Garden</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      min-height: 100vh;
      background: #0a0a1a;
      color: #e0e0e0;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 24px;
    }

    h1 { color: #00d2ff; margin-bottom: 8px; }
    p.info { color: #666; margin-bottom: 20px; font-size: 0.85rem; }

    .main {
      display: flex;
      gap: 20px;
      flex-wrap: wrap;
      justify-content: center;
    }

    canvas {
      border: 1px solid #222;
      border-radius: 8px;
      background: #0d0d1a;
      cursor: crosshair;
    }

    .sidebar {
      width: 220px;
      display: flex;
      flex-direction: column;
      gap: 12px;
    }

    .panel {
      background: #1a1a2e;
      border: 1px solid #333;
      border-radius: 8px;
      padding: 12px;
    }

    .panel h3 { color: #00d2ff; font-size: 0.85rem; margin-bottom: 8px; }

    .seed-btn {
      display: block;
      width: 100%;
      padding: 6px 12px;
      margin-bottom: 4px;
      border: 1px solid #444;
      border-radius: 4px;
      background: #2a2a3e;
      color: #e0e0e0;
      cursor: pointer;
      font-size: 0.8rem;
      text-align: left;
    }

    .seed-btn:hover { background: #3a3a5e; }
    .seed-btn.active { border-color: #00d2ff; background: #1a3a5e; }

    .stat-row {
      display: flex;
      justify-content: space-between;
      font-size: 0.8rem;
      padding: 2px 0;
      font-family: monospace;
    }

    .stat-label { color: #888; }
    .stat-value { color: #ccc; }

    .action-btn {
      display: block;
      width: 100%;
      padding: 8px;
      margin-bottom: 6px;
      border: 1px solid #444;
      border-radius: 4px;
      background: #2a2a3e;
      color: #e0e0e0;
      cursor: pointer;
      font-size: 0.8rem;
    }

    .action-btn:hover { background: #3a3a5e; }
  </style>
</head>
<body>
  <h1>Living Garden</h1>
  <p class="info">Select a seed type, then click the canvas to plant. Feed energy to watch cells grow and evolve.</p>

  <div class="main">
    <canvas id="garden-canvas" width="600" height="600"></canvas>

    <div class="sidebar">
      <div class="panel">
        <h3>Seeds</h3>
        <button class="seed-btn active" data-type="ButtonCore">ButtonCore</button>
        <button class="seed-btn" data-type="InputField">InputField</button>
        <button class="seed-btn" data-type="TextDisplay">TextDisplay</button>
        <button class="seed-btn" data-type="Container">Container</button>
        <button class="seed-btn" data-type="Decoration">Decoration</button>
        <button class="seed-btn" data-type="Header">Header</button>
        <button class="seed-btn" data-type="Navigation">Navigation</button>
        <button class="seed-btn" data-type="DataVisualization">DataVisualization</button>
      </div>

      <div class="panel">
        <h3>Statistics</h3>
        <div class="stat-row"><span class="stat-label">Cells:</span><span class="stat-value" id="stat-cells">0</span></div>
        <div class="stat-row"><span class="stat-label">Energy:</span><span class="stat-value" id="stat-energy">0</span></div>
        <div class="stat-row"><span class="stat-label">Time:</span><span class="stat-value" id="stat-time">0s</span></div>
      </div>

      <div class="panel">
        <h3>Actions</h3>
        <button class="action-btn" id="btn-feed-all">Feed All (+100)</button>
        <button class="action-btn" id="btn-efficiency">Pressure: Efficiency</button>
        <button class="action-btn" id="btn-visual">Pressure: Visual</button>
        <button class="action-btn" id="btn-cooperation">Pressure: Cooperation</button>
        <button class="action-btn" id="btn-export">Export State</button>
      </div>
    </div>
  </div>

  <script type="module" src="/src/main.ts"></script>
</body>
</html>
