<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Cliffy Alive Button</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      background: #1a1a2e;
      color: #e0e0e0;
    }

    h1 { margin-bottom: 16px; color: #00d2ff; }
    p.info { margin-bottom: 24px; color: #888; font-size: 0.9rem; }

    #alive-container {
      position: relative;
      width: 400px;
      height: 400px;
      border: 1px solid #333;
      border-radius: 12px;
      overflow: hidden;
      background: #0d0d1a;
    }

    canvas {
      display: block;
      border-radius: 12px;
    }

    .stats {
      margin-top: 16px;
      font-family: monospace;
      font-size: 0.85rem;
      color: #666;
    }

    .controls {
      margin-top: 16px;
      display: flex;
      gap: 12px;
    }

    button {
      padding: 8px 20px;
      border: 1px solid #444;
      border-radius: 6px;
      background: #2a2a3e;
      color: #e0e0e0;
      cursor: pointer;
      font-size: 0.9rem;
    }

    button:hover { background: #3a3a5e; }
  </style>
</head>
<body>
  <h1>Living Button</h1>
  <p class="info">Click the canvas to feed energy. Watch the button grow and evolve.</p>
  <div id="alive-container">
    <canvas id="alive-canvas" width="400" height="400"></canvas>
  </div>
  <div class="stats" id="stats">Loading...</div>
  <div class="controls">
    <button id="btn-feed">Feed Energy</button>
    <button id="btn-pressure">Apply Pressure</button>
    <button id="btn-reset">Reset</button>
  </div>
  <script type="module" src="/src/main.ts"></script>
</body>
</html>
